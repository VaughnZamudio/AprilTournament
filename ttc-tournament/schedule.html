<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Schedule · IIT TTC April 2026</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .match-table {
      width: 100%;
      border-collapse: collapse;
    }
    .match-table thead th {
      background: var(--surface2);
      padding: 8px 12px;
      text-align: left;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .match-table tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    .match-table tbody tr:last-child { border-bottom: none; }
    .match-table tbody tr:hover { background: rgba(255,255,255,0.02); }
    .match-table tbody tr.complete { opacity: 0.7; }
    .match-table tbody tr.complete:hover { opacity: 1; }

    .match-table td {
      padding: 9px 12px;
      vertical-align: middle;
    }
    .mid-col { width: 90px; }
    .round-col { width: 130px; color: var(--muted); font-size: 0.8rem; }
    .vs-col { width: 30px; text-align: center; color: var(--muted); font-weight: 700; font-size: 0.8rem; }
    .score-col { width: 80px; text-align: center; }
    .action-col { width: 90px; text-align: right; }

    .score-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      color: var(--score-txt);
      font-size: 1rem;
    }

    .auto-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.7rem;
      font-weight: 700;
      background: rgba(139,148,158,0.15);
      color: var(--muted);
      border: 1px solid var(--border);
    }

    .day-divider {
      padding: 16px 0 8px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .day-divider h2 {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 1.25rem;
      letter-spacing: 0.04em;
    }
    .day-divider .day-num {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .section-header-row td {
      background: var(--surface2);
      padding: 6px 12px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.06em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .section-header-row.wb td { color: #93c5fd; background: rgba(29,78,216,0.07); }
    .section-header-row.lb td { color: #fca5a5; background: rgba(185,28,28,0.07); }
    .section-header-row.gf td { color: var(--accent2); background: rgba(232,160,32,0.07); }

    .topbar-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 12px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-wrap: wrap;
    }
    .topbar-actions .filter-label {
      font-size: 0.8rem;
      color: var(--muted);
      font-weight: 600;
    }
    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      padding: 5px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.1s;
      font-family: 'Barlow', sans-serif;
    }
    .filter-btn:hover { border-color: var(--border2); color: var(--text); }
    .filter-btn.active { background: rgba(232,160,32,0.12); border-color: var(--accent); color: var(--accent); }
    .reset-btn {
      margin-left: auto;
      background: rgba(185,28,28,0.1);
      border: 1px solid rgba(185,28,28,0.3);
      color: #fca5a5;
      border-radius: var(--radius);
      padding: 5px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Barlow', sans-serif;
    }
    .reset-btn:hover { background: rgba(185,28,28,0.2); }

    .note-cell { font-size: 0.72rem; }
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="index.html" class="logo">🏓 IIT TTC</a>
    <a href="index.html">Home</a>
    <a href="schedule.html" class="active">Schedule</a>
    <a href="bracket.html">Bracket</a>
    <a href="results.html">Results</a>
    <div class="spacer"></div>
    <button class="share-btn" onclick="copyShareUrl()">📋 Copy Share Link</button>
  </nav>

  <div class="page-header">
    <h1>Match Schedule</h1>
    <p>Click <strong>Enter Score</strong> on any match to record the result. Bracket updates automatically.</p>
  </div>

  <div class="topbar-actions">
    <span class="filter-label">Show:</span>
    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All matches</button>
    <button class="filter-btn" data-filter="1" onclick="setFilter('1', this)">Day 1 – Wed Apr 1</button>
    <button class="filter-btn" data-filter="2" onclick="setFilter('2', this)">Day 2 – Thu Apr 2</button>
    <button class="filter-btn" data-filter="3" onclick="setFilter('3', this)">Day 3 – Fri Apr 3</button>
    <button class="filter-btn" data-filter="pending" onclick="setFilter('pending', this)">Pending only</button>
    <button class="reset-btn" onclick="confirmReset()">🗑 Reset all data</button>
  </div>

  <div class="container" style="padding-top:16px;">
    <div id="schedule-content"></div>
  </div>

  <!-- Match entry modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Enter Score</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-players" id="modal-players"></div>
        <div class="warn-banner" id="modal-constraint" style="display:none; margin-bottom:14px;"></div>
        <div class="score-inputs">
          <div class="score-input-wrap">
            <label id="score-label-1">Player 1</label>
            <input type="number" id="score1" min="0" max="99" placeholder="0"
                   oninput="updateWinnerFromScore()">
          </div>
          <div class="dash">—</div>
          <div class="score-input-wrap">
            <label id="score-label-2">Player 2</label>
            <input type="number" id="score2" min="0" max="99" placeholder="0"
                   oninput="updateWinnerFromScore()">
          </div>
        </div>
        <div class="winner-selector">
          <label>Winner</label>
          <div class="winner-btns" id="winner-btns"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-secondary" id="btn-clear" onclick="clearResult()" style="display:none;">Clear result</button>
        <button class="btn-primary" id="btn-save" onclick="saveResult()" disabled>Save Result</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/state.js"></script>
  <script>
    let state = loadState();
    let currentFilter = 'all';
    let editingMatchId = null;
    let selectedWinner = null;

    function getDisplayName(id) {
      if (!id) return '';
      const p = PLAYERS.find(x => x.id === id);
      if (!p) return '?';
      return p.name + (p.nickname ? ` (${p.nickname})` : '');
    }

    function chipHTML(id, isWinner, isLoser) {
      if (!id) return '<span class="player-chip empty">TBD</span>';
      const p = PLAYERS.find(x => x.id === id);
      if (!p) return `<span class="player-chip empty">#${id}</span>`;
      let cls = `player-chip ${p.level}`;
      if (isWinner) cls += ' winner';
      return `<span class="${cls}">${p.name}${p.nickname ? ` <span style="opacity:.7">(${p.nickname})</span>` : ''}</span>`;
    }

    function renderSchedule() {
      const { allMatches, results } = computeBracket(state);

      // Group by day
      const byDay = { 1: [], 2: [], 3: [] };
      allMatches.forEach(m => {
        if (m.isBye || (m.autoWinner && !m.feedFrom)) return; // skip pure byes
        const day = m.day || 1;
        byDay[day].push(m);
      });

      const dayColors = { 1: 'badge-day1', 2: 'badge-day2', 3: 'badge-day3' };
      const dayNames = { 1: 'Wednesday, April 1', 2: 'Thursday, April 2', 3: 'Friday, April 3' };
      const dayNums  = { 1: 'Day 1', 2: 'Day 2', 3: 'Day 3' };

      let html = '';

      [1,2,3].forEach(day => {
        const matches = byDay[day];
        if (matches.length === 0) return;

        const isPending = currentFilter === 'pending';
        const isDay = currentFilter === String(day);
        const isAll = currentFilter === 'all';
        if (!isAll && !isDay && !isPending) return;

        const filteredMatches = isPending
          ? matches.filter(m => !state.matchResults[m.id]?.complete && m.p1 && m.p2)
          : matches;

        if (filteredMatches.length === 0) return;

        const done = matches.filter(m => state.matchResults[m.id]?.complete).length;
        const total = matches.filter(m => !m.autoWinner || m.feedFrom).length;

        html += `
          <div class="day-divider" data-day="${day}">
            <span class="day-num">${dayNums[day]}</span>
            <h2>${dayNames[day]}</h2>
            <span class="badge ${dayColors[day]}" style="margin-left:4px;">12–3 PM</span>
            <span class="day-progress" style="margin-left:auto;">${done}/${total} complete</span>
          </div>
          <div class="card" style="margin-bottom:20px;">
          <table class="match-table">
            <thead>
              <tr>
                <th class="mid-col">Match</th>
                <th class="round-col">Round</th>
                <th>Player 1</th>
                <th class="vs-col"></th>
                <th>Player 2</th>
                <th class="score-col">Score</th>
                <th class="action-col"></th>
              </tr>
            </thead>
            <tbody>`;

        // Sort: WB first, then LB
        const sorted = [...filteredMatches].sort((a,b) => {
          const wbFirst = a.round.startsWith('WB') ? -1 : a.round === 'GF' ? 1 : 0;
          const wbFirstB = b.round.startsWith('WB') ? -1 : b.round === 'GF' ? 1 : 0;
          if (wbFirst !== wbFirstB) return wbFirst - wbFirstB;
          return a.id.localeCompare(b.id);
        });

        let lastRoundType = null;
        sorted.forEach(m => {
          const r = state.matchResults[m.id];
          const isComplete = r?.complete;
          const isAuto = r?.auto;
          const winner = r?.winner;
          const loser = winner ? (m.p1 === winner ? m.p2 : m.p1) : null;

          const roundType = m.round.startsWith('WB') ? 'wb' : m.round === 'GF' ? 'gf' : 'lb';
          if (roundType !== lastRoundType) {
            const label = roundType === 'wb' ? '🏆 Winners Bracket' : roundType === 'gf' ? '🏆 Grand Final' : '💀 Losers Bracket';
            html += `<tr class="section-header-row ${roundType}"><td colspan="7">${label}</td></tr>`;
            lastRoundType = roundType;
          }

          const hasConstraint = m.schedulingNote;
          const constraintHTML = m.schedulingNote === 'before-150'
            ? '<span class="constraint-pill time">⏰ Before 1:50 PM</span>'
            : m.schedulingNote === 'wed-fri'
            ? '<span class="constraint-pill wed-fri">⚠️ Fri (Zuzu)</span>' : '';

          const p1IsWinner = isComplete && m.p1 === winner;
          const p2IsWinner = isComplete && m.p2 === winner;

          const canEnter = (m.p1 && m.p2) || isComplete;
          const btnLabel = isAuto ? '' : (isComplete ? 'Edit' : 'Enter Score');
          const btnClass = isComplete && !isAuto ? 'done' : '';

          html += `<tr class="${isComplete ? 'complete' : ''}" data-match="${m.id}">
            <td class="mid-col">
              <span class="match-id" style="font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:0.85rem;color:var(--muted);">${m.id.split('-').slice(-1)[0]}</span>
              <div style="font-size:0.65rem;color:var(--muted);margin-top:1px;">${m.id.replace(/-M\d+$/,'')}</div>
            </td>
            <td class="round-col">
              <span style="font-size:0.8rem;">${ROUND_LABELS[m.round] || m.round}</span>
              ${constraintHTML ? `<div style="margin-top:3px;">${constraintHTML}</div>` : ''}
            </td>
            <td>${chipHTML(m.p1, p1IsWinner, !p1IsWinner && isComplete)}</td>
            <td class="vs-col">vs</td>
            <td>${chipHTML(m.p2, p2IsWinner, !p2IsWinner && isComplete)}</td>
            <td class="score-col">
              ${isAuto ? '<span class="auto-badge">BYE</span>'
                : isComplete ? `<span class="score-text">${r.score1}–${r.score2}</span>` : '—'}
            </td>
            <td class="action-col">
              ${!isAuto && canEnter ? `<button class="btn-enter ${btnClass}" onclick="openModal('${m.id}')">${btnLabel}</button>` : ''}
            </td>
          </tr>`;
        });

        html += '</tbody></table></div>';
      });

      if (!html) html = '<div style="padding:40px;text-align:center;color:var(--muted);">No matches match the current filter.</div>';
      document.getElementById('schedule-content').innerHTML = html;
    }

    // ── Modal ─────────────────────────────────────────────────────────────────
    function openModal(matchId) {
      const { allMatches } = computeBracket(state);
      const m = allMatches.find(x => x.id === matchId);
      if (!m || m.autoWinner) return;

      editingMatchId = matchId;
      selectedWinner = null;

      const r = state.matchResults[matchId];

      document.getElementById('modal-title').textContent = `${m.id} · ${ROUND_LABELS[m.round] || m.round}`;

      const constraintEl = document.getElementById('modal-constraint');
      if (m.schedulingNote === 'before-150') {
        constraintEl.style.display = 'flex';
        constraintEl.innerHTML = '<span>⏰</span> <div><strong>Time constraint:</strong> Pavle Veselinovic must play before 1:50 PM.</div>';
      } else if (m.schedulingNote === 'wed-fri') {
        constraintEl.style.display = 'flex';
        constraintEl.innerHTML = '<span>⚠️</span> <div><strong>Day constraint:</strong> Obafemi (Zuzu) is only available Wed & Fri. This match is scheduled Friday.</div>';
      } else {
        constraintEl.style.display = 'none';
      }

      const p1 = PLAYERS.find(x => x.id === m.p1);
      const p2 = PLAYERS.find(x => x.id === m.p2);

      document.getElementById('modal-players').innerHTML = `
        ${m.p1 ? `<span class="player-chip ${p1?.level || ''}">${getDisplayName(m.p1)}</span>` : '<span class="player-chip empty">TBD</span>'}
        <span class="vs">vs</span>
        ${m.p2 ? `<span class="player-chip ${p2?.level || ''}">${getDisplayName(m.p2)}</span>` : '<span class="player-chip empty">TBD</span>'}
      `;

      document.getElementById('score-label-1').textContent = p1 ? p1.name.split(' ')[0] : 'Player 1';
      document.getElementById('score-label-2').textContent = p2 ? p2.name.split(' ')[0] : 'Player 2';

      const s1El = document.getElementById('score1');
      const s2El = document.getElementById('score2');
      s1El.value = r ? r.score1 : '';
      s2El.value = r ? r.score2 : '';

      const clearBtn = document.getElementById('btn-clear');
      clearBtn.style.display = r?.complete ? 'inline-block' : 'none';

      renderWinnerBtns(m, r?.winner || null);

      document.getElementById('modal-overlay').style.display = 'flex';
      s1El.focus();
    }

    function renderWinnerBtns(m, preselected) {
      const wb = document.getElementById('winner-btns');
      if (!m.p1 || !m.p2) {
        wb.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;">Both players must be set before entering a result.</div>';
        return;
      }

      const p1 = PLAYERS.find(x => x.id === m.p1);
      const p2 = PLAYERS.find(x => x.id === m.p2);

      selectedWinner = preselected;

      wb.innerHTML = `
        <button class="winner-btn ${selectedWinner === m.p1 ? 'selected' : ''}"
          onclick="selectWinner(${m.p1})" id="wbtn-${m.p1}">
          ${p1 ? p1.name.split(' ')[0] : '?'}
        </button>
        <button class="winner-btn ${selectedWinner === m.p2 ? 'selected' : ''}"
          onclick="selectWinner(${m.p2})" id="wbtn-${m.p2}">
          ${p2 ? p2.name.split(' ')[0] : '?'}
        </button>
      `;
      validateSave();
    }

    function selectWinner(pid) {
      selectedWinner = pid;
      document.querySelectorAll('.winner-btn').forEach(b => b.classList.remove('selected'));
      const btn = document.getElementById(`wbtn-${pid}`);
      if (btn) btn.classList.add('selected');
      validateSave();
    }

    function updateWinnerFromScore() {
      const s1 = parseInt(document.getElementById('score1').value);
      const s2 = parseInt(document.getElementById('score2').value);
      if (!isNaN(s1) && !isNaN(s2) && s1 !== s2) {
        const { allMatches } = computeBracket(state);
        const m = allMatches.find(x => x.id === editingMatchId);
        if (m) {
          const autoWin = s1 > s2 ? m.p1 : m.p2;
          if (autoWin) selectWinner(autoWin);
        }
      }
      validateSave();
    }

    function validateSave() {
      document.getElementById('btn-save').disabled = !selectedWinner;
    }

    function saveResult() {
      if (!editingMatchId || !selectedWinner) return;
      const s1 = document.getElementById('score1').value || '–';
      const s2 = document.getElementById('score2').value || '–';

      if (!state.matchResults) state.matchResults = {};
      state.matchResults[editingMatchId] = {
        winner: selectedWinner,
        score1: s1,
        score2: s2,
        complete: true,
        auto: false
      };

      saveState(state);
      closeModal();
      renderSchedule();
      showToast(`Result saved! Bracket updated.`, 'success');
    }

    function clearResult() {
      if (!editingMatchId) return;
      if (!confirm('Clear this result? This may affect later rounds.')) return;
      delete state.matchResults[editingMatchId];
      saveState(state);
      closeModal();
      renderSchedule();
      showToast('Result cleared.', 'info');
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
      editingMatchId = null;
      selectedWinner = null;
    }

    function confirmReset() {
      if (!confirm('Reset ALL results? This cannot be undone.')) return;
      state = { matchResults: {}, grandFinalReset: false };
      saveState(state);
      renderSchedule();
      showToast('All results cleared.', 'info');
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderSchedule();
    }

    function copyShareUrl() {
      navigator.clipboard.writeText(window.location.href).then(() =>
        showToast('Share link copied! Others will see the same bracket state.', 'success'));
    }

    function showToast(msg, type = 'info') {
      const t = document.createElement('div');
      t.className = `toast ${type}`;
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }

    // Close modal on overlay click
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'Enter' && editingMatchId) saveResult();
    });

    renderSchedule();
  </script>
</body>
</html>
