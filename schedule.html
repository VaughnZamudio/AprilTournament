<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Schedule · IIT TTC April 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="topnav">
    <a href="index.html" class="logo">🏓 IIT TTC</a>
    <a href="index.html">Home</a>
    <a href="schedule.html" class="active">Schedule</a>
    <a href="bracket.html">Bracket</a>
    <a href="results.html">Results</a>
    <div class="spacer"></div>
    <button class="share-btn" onclick="copyShareUrl()">📋 Share</button>
  </nav>

  <div class="page-header">
    <h1>Match Schedule</h1>
    <p>Tap <strong>Enter Score</strong> on any match to record the result. All devices sync instantly.</p>
  </div>

  <div class="filter-bar">
    <span class="filter-label">Show:</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('1',this)">Day 1 · Wed</button>
    <button class="filter-btn" onclick="setFilter('2',this)">Day 2 · Thu</button>
    <button class="filter-btn" onclick="setFilter('3',this)">Day 3 · Fri</button>
    <button class="filter-btn" onclick="setFilter('pending',this)">Pending</button>
    <button class="reset-btn" onclick="confirmReset()">🗑 Reset</button>
  </div>

  <div style="padding: 16px 16px 0;" id="schedule-content"></div>

  <!-- Score Modal -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title">Enter Score</h3>
        <button class="modal-close" onclick="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-players" id="modal-players"></div>
        <div class="warn-banner" id="modal-constraint" style="display:none; margin-bottom:14px;"></div>
        <div class="score-inputs">
          <div class="score-input-wrap">
            <label id="score-label-1">P1</label>
            <input type="number" id="score1" min="0" max="99" placeholder="0" inputmode="numeric" oninput="updateWinnerFromScore()">
          </div>
          <div class="dash">—</div>
          <div class="score-input-wrap">
            <label id="score-label-2">P2</label>
            <input type="number" id="score2" min="0" max="99" placeholder="0" inputmode="numeric" oninput="updateWinnerFromScore()">
          </div>
        </div>
        <div class="winner-selector">
          <label>Winner</label>
          <div class="winner-btns" id="winner-btns"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancel</button>
        <button class="btn-secondary" id="btn-clear" onclick="clearResult()" style="display:none;">Clear</button>
        <button class="btn-primary" id="btn-save" onclick="saveResult()" disabled>Save Result</button>
      </div>
    </div>
  </div>

  <script src="data.js"></script>
  <script src="state.js"></script>
  <script>
    let state = loadState();
    let currentFilter = 'all';
    let editingMatchId = null;
    let selectedWinner = null;

    // Live sync from other devices
    onStateChange(newState => {
      state = newState;
      renderSchedule();
      showToast('📡 Updated by another device', 'info');
    });

    function pName(id) {
      if (!id) return 'TBD';
      const p = PLAYERS.find(x => x.id === id);
      return p ? p.name + (p.nickname ? ` (${p.nickname})` : '') : '?';
    }

    function renderSchedule() {
      const { allMatches, results } = computeBracket(state);
      const byDay = {1:[], 2:[], 3:[]};

      allMatches.forEach(m => {
        // Show all non-pure-bye matches. Pure byes (no feedFrom and autoWinner) are skipped.
        if (m.autoWinner && !m.feedFrom) return;
        if (m.isBye && m.feedType && m.feedType[0] !== 'loser') return; // skip WB-R1 byes from schedule
        byDay[m.day || 1].push(m);
      });

      const dayNames = {1:'Wednesday, April 1', 2:'Thursday, April 2', 3:'Friday, April 3'};
      const dayBadge = {1:'badge-day1', 2:'badge-day2', 3:'badge-day3'};
      let html = '';

      [1,2,3].forEach(day => {
        let matches = byDay[day];
        if (!matches.length) return;

        const isPending = currentFilter === 'pending';
        const isDayFilter = currentFilter === String(day);
        const isAll = currentFilter === 'all';
        if (!isAll && !isDayFilter && !isPending) return;

        let filtered = isPending
          ? matches.filter(m => !results[m.id]?.complete && m.p1 && m.p2)
          : matches;

        if (!filtered.length) return;

        const total = matches.filter(m => !(results[m.id]?.auto)).length;
        const done = matches.filter(m => results[m.id]?.complete && !results[m.id]?.auto).length;

        html += `<div class="day-section">
          <div class="day-header">
            <span class="badge ${dayBadge[day]}">Day ${day}</span>
            <h2>${dayNames[day]}</h2>
            <span class="day-progress">${done}/${total} done</span>
          </div>`;

        // Sort: WB first, then LB, then GF
        const sorted = [...filtered].sort((a,b) => {
          const pri = r => r.startsWith('WB') ? 0 : r === 'GF' ? 2 : 1;
          if (pri(a.round) !== pri(b.round)) return pri(a.round) - pri(b.round);
          return a.id.localeCompare(b.id);
        });

        let lastSection = null;
        sorted.forEach(m => {
          const r = results[m.id];
          const isComplete = r?.complete;
          const isAuto = r?.auto;
          const winner = r?.winner;
          const section = m.round.startsWith('WB') ? 'wb' : m.round === 'GF' ? 'gf' : 'lb';
          const sectionLabel = {'wb':'🏆 Winners Bracket', 'lb':'💀 Losers Bracket', 'gf':'🏆 Grand Final'}[section];

          if (section !== lastSection) {
            html += `<div class="section-label ${section}">${sectionLabel}</div>`;
            lastSection = section;
          }

          const p1 = PLAYERS.find(x => x.id === m.p1);
          const p2 = PLAYERS.find(x => x.id === m.p2);
          const p1Win = isComplete && m.p1 === winner;
          const p2Win = isComplete && m.p2 === winner;

          const constraintBadge = m.schedulingNote === 'before-150'
            ? '<span class="constraint-pill time">⏰ Before 1:50 PM</span>'
            : m.schedulingNote === 'wed-fri'
            ? '<span class="constraint-pill wed-fri">⚠️ Fri only (Zuzu)</span>' : '';

          const canEnter = (m.p1 && m.p2) || isComplete;
          const btnLabel = isAuto ? '' : (isComplete ? '✏️ Edit' : '+ Score');
          const btnClass = isComplete && !isAuto ? 'done' : '';

          const p1Name = m.p1 ? pName(m.p1) : (isAuto ? 'BYE' : 'TBD');
          const p2Name = m.p2 ? pName(m.p2) : (m.feedType?.[1]==='bye' ? '— bye —' : 'TBD');

          html += `<div class="match-card ${isComplete ? 'complete' : ''}">
            <div class="match-card-header">
              <span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;">${m.id}</span>
              <span>${ROUND_LABELS[m.round] || m.round}</span>
              ${constraintBadge}
              ${isAuto ? '<span class="auto-badge">BYE</span>' : ''}
            </div>
            <div class="match-card-body">
              <div class="mc-players">
                <div class="mc-player">
                  ${m.p1 ? `<div class="level-dot ${p1?.level}"></div>` : ''}
                  <span class="pname${p1Win?' winner':(!isComplete&&!m.p1?' tbd':isComplete?' loser':'')}">${p1Name}</span>
                  ${isComplete && !isAuto ? `<span class="mc-score ${p1Win?'win':'lose'}">${r.score1}</span>` : ''}
                </div>
                <div class="mc-divider"></div>
                <div class="mc-player">
                  ${m.p2 ? `<div class="level-dot ${p2?.level}"></div>` : ''}
                  <span class="pname${p2Win?' winner':(!isComplete&&!m.p2?' tbd':isComplete&&m.p2?' loser':'')}">${p2Name}</span>
                  ${isComplete && !isAuto && m.p2 ? `<span class="mc-score ${p2Win?'win':'lose'}">${r.score2}</span>` : ''}
                </div>
              </div>
              <div class="mc-action">
                ${!isAuto && canEnter ? `<button class="btn-enter ${btnClass}" onclick="openModal('${m.id}')">${btnLabel}</button>` : ''}
              </div>
            </div>
          </div>`;
        });
        html += '</div>';
      });

      if (!html) html = '<div style="padding:40px;text-align:center;color:var(--muted);">No matches match the current filter.</div>';
      document.getElementById('schedule-content').innerHTML = html;
    }

    function openModal(matchId) {
      const { allMatches } = computeBracket(state);
      const m = allMatches.find(x => x.id === matchId);
      if (!m || (m.autoWinner && !m.feedFrom)) return;

      editingMatchId = matchId;
      selectedWinner = null;
      const r = state.matchResults[matchId];

      document.getElementById('modal-title').textContent = `${m.id} · ${ROUND_LABELS[m.round] || m.round}`;

      const constraintEl = document.getElementById('modal-constraint');
      if (m.schedulingNote === 'before-150') {
        constraintEl.style.display = 'flex';
        constraintEl.innerHTML = '<span>⏰</span><div><strong>Time constraint:</strong> Pavle Veselinovic must play before 1:50 PM.</div>';
      } else if (m.schedulingNote === 'wed-fri') {
        constraintEl.style.display = 'flex';
        constraintEl.innerHTML = '<span>⚠️</span><div><strong>Day constraint:</strong> Obafemi (Zuzu) is only available Wed & Fri. This match is on Friday.</div>';
      } else { constraintEl.style.display = 'none'; }

      const p1 = PLAYERS.find(x => x.id === m.p1);
      const p2 = PLAYERS.find(x => x.id === m.p2);

      document.getElementById('modal-players').innerHTML = `
        ${m.p1 ? `<span class="player-chip ${p1?.level}">${pName(m.p1)}</span>` : '<span class="player-chip empty">TBD</span>'}
        <span class="vs">vs</span>
        ${m.p2 ? `<span class="player-chip ${p2?.level}">${pName(m.p2)}</span>` : '<span class="player-chip empty">TBD</span>'}
      `;
      document.getElementById('score-label-1').textContent = p1?.name.split(' ')[0] || 'P1';
      document.getElementById('score-label-2').textContent = p2?.name.split(' ')[0] || 'P2';
      document.getElementById('score1').value = r ? r.score1 : '';
      document.getElementById('score2').value = r ? r.score2 : '';
      document.getElementById('btn-clear').style.display = r?.complete && !r?.auto ? 'inline-block' : 'none';

      const wb = document.getElementById('winner-btns');
      if (!m.p1 || !m.p2) {
        wb.innerHTML = '<div style="color:var(--muted);font-size:0.85rem;">Both players must be known to enter a score.</div>';
      } else {
        selectedWinner = r?.winner || null;
        wb.innerHTML = `
          <button class="winner-btn ${selectedWinner===m.p1?'selected':''}" onclick="selectWinner(${m.p1})" id="wbtn-${m.p1}">${p1?.name.split(' ')[0]||'?'}</button>
          <button class="winner-btn ${selectedWinner===m.p2?'selected':''}" onclick="selectWinner(${m.p2})" id="wbtn-${m.p2}">${p2?.name.split(' ')[0]||'?'}</button>`;
      }
      validateSave();
      document.getElementById('modal-overlay').style.display = 'flex';
      setTimeout(() => document.getElementById('score1').focus(), 100);
    }

    function selectWinner(pid) {
      selectedWinner = pid;
      document.querySelectorAll('.winner-btn').forEach(b => b.classList.remove('selected'));
      const btn = document.getElementById(`wbtn-${pid}`);
      if (btn) btn.classList.add('selected');
      validateSave();
    }

    function updateWinnerFromScore() {
      const s1 = parseInt(document.getElementById('score1').value);
      const s2 = parseInt(document.getElementById('score2').value);
      if (!isNaN(s1) && !isNaN(s2) && s1 !== s2) {
        const { allMatches } = computeBracket(state);
        const m = allMatches.find(x => x.id === editingMatchId);
        if (m) { const aw = s1 > s2 ? m.p1 : m.p2; if (aw) selectWinner(aw); }
      }
      validateSave();
    }

    function validateSave() {
      document.getElementById('btn-save').disabled = !selectedWinner;
    }

    function saveResult() {
      if (!editingMatchId || !selectedWinner) return;
      const s1 = document.getElementById('score1').value || '–';
      const s2 = document.getElementById('score2').value || '–';
      if (!state.matchResults) state.matchResults = {};
      state.matchResults[editingMatchId] = { winner: selectedWinner, score1: s1, score2: s2, complete: true, auto: false };
      saveState(state);
      closeModal();
      renderSchedule();
      showToast('✓ Result saved! Bracket updated.', 'success');
    }

    function clearResult() {
      if (!editingMatchId) return;
      if (!confirm('Clear this result? Later rounds may be affected.')) return;
      delete state.matchResults[editingMatchId];
      saveState(state);
      closeModal();
      renderSchedule();
      showToast('Result cleared.', 'info');
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
      editingMatchId = null; selectedWinner = null;
    }

    function confirmReset() {
      if (!confirm('Reset ALL results? This cannot be undone.')) return;
      state = { matchResults: {}, grandFinalReset: false };
      saveState(state);
      renderSchedule();
      showToast('All results cleared.', 'info');
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderSchedule();
    }

    function copyShareUrl() {
      navigator.clipboard.writeText(window.location.href).then(() =>
        showToast('Link copied! Others will see the same bracket.', 'success'));
    }

    function showToast(msg, type = 'info') {
      const t = document.createElement('div');
      t.className = `toast ${type}`; t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 3500);
    }

    document.getElementById('modal-overlay').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
      if (e.key === 'Enter' && editingMatchId && selectedWinner) saveResult();
    });

    renderSchedule();
  </script>
</body>
</html>
